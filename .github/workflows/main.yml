name: Atualizar Painel FEAS

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 12 * * 1-5'

jobs:
  gerar-painel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: pip install pandas openpyxl xlrd
      
      - name: Gerar painel
        run: python gerar_painel_feas.py
      
      - name: Publicar painel
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Painel atualizado automaticamente" || echo "Sem alterações"
          git push
